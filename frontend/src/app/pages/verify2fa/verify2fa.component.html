<div class="auth-container">
    <div class="auth-card">
        <div class="brand-header">
            <div class="brand-icon">U</div>
            <h1>Verificación en dos pasos</h1>
            <p>Ingresa el código de 6 dígitos generado por tu aplicación autenticadora.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="code">Código de verificación</label>
                <input id="code" type="text" formControlName="code" maxlength="6" inputmode="numeric"
                    placeholder="123456" class="code-input" />

                @if (form.get('code')?.touched && form.get('code')?.invalid) {
                <small class="error-text">
                    El código debe tener exactamente 6 dígitos.
                </small>
                }
            </div>

            @if (error()) {
            <div class="error-box">
                {{ error() }}
            </div>
            }

            <button type="submit" [disabled]="loading()">
                {{ loading() ? 'Verificando...' : 'Verificar código' }}
            </button>
        </form>
    </div>
</div>
