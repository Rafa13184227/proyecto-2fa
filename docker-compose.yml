version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: auth2fa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_2fa_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: auth2fa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend-node:
    build: ./backend-node
    container_name: auth2fa_node
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: appuser
      DB_PASS: apppass
      DB_NAME: auth_2fa_db
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:4200
      JWT_ACCESS_SECRET: supersecretaccess
      JWT_REFRESH_SECRET: supersecretrefresh
    ports:
      - "3000:3000"

  backend-php:
    build: ./backend-php
    container_name: auth2fa_php
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: auth_2fa_db
      DB_USER: appuser
      DB_PASS: apppass
      JWT_SECRET: supersecretaccess
      CORS_ORIGIN: http://localhost:4200
      APP_DEBUG: "true"
    ports:
      - "8080:80"

volumes:
  mysql_data: